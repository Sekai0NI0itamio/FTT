name: FTT Process Files

on:
  workflow_dispatch:
    inputs:
      visual_mode:
        description: "Visual mode: embedded|hybrid|full"
        required: false
        default: "hybrid"
      vision_backend:
        description: "Vision backend: local_llama_cpp|openai|anthropic|gemini"
        required: false
        default: "local_llama_cpp"
      file_workers:
        description: "File worker concurrency"
        required: false
        default: "2"
      vision_workers:
        description: "Vision worker concurrency"
        required: false
        default: "1"
      deplot_workers:
        description: "DePlot worker concurrency"
        required: false
        default: "1"
      chat_template:
        description: "Chat template for llama.cpp (e.g. vicuna)"
        required: false
        default: "vicuna"
      render_max_pages:
        description: "Max pages rendered per file"
        required: false
        default: "30"
      keep_visuals:
        description: "Keep rendered visuals in artifact"
        required: false
        default: "true"
      model_url:
        description: "Optional model download URL"
        required: false
        default: ""
      mmproj_url:
        description: "Optional mmproj download URL"
        required: false
        default: ""

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils libreoffice

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: ~/.cache/ftt/models
          key: ${{ runner.os }}-ftt-models

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp
          key: ${{ runner.os }}-llama-cmake-v1

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build llama.cpp
        run: |
          if [ ! -d vendor/llama.cpp/.git ]; then
            rm -rf vendor/llama.cpp
            git clone --depth 1 https://github.com/ggerganov/llama.cpp vendor/llama.cpp
          fi
          if [ ! -f vendor/llama.cpp/build/bin/llama-mtmd-cli ] && [ ! -f vendor/llama.cpp/build/bin/llama-llava-cli ] && [ ! -f vendor/llama.cpp/build/bin/llava-cli ]; then
            cmake -S vendor/llama.cpp -B vendor/llama.cpp/build -DGGML_NATIVE=OFF
            cmake --build vendor/llama.cpp/build -j$(nproc)
          fi
          LLAMA_CLI=$(find vendor/llama.cpp/build -type f \( -name 'llama-mtmd-cli' -o -name 'llama-llava-cli' -o -name 'llava-cli' \) | head -n 1)
          if [ -z "$LLAMA_CLI" ]; then
            echo "llama CLI binary not found after build" >&2
            find vendor/llama.cpp/build -maxdepth 3 -type f -name '*llava*' >&2 || true
            find vendor/llama.cpp/build -maxdepth 3 -type f -name '*mtmd*' >&2 || true
            exit 1
          fi
          echo "FTT_VISION_LLAMA_CLI_PATH=$LLAMA_CLI" >> $GITHUB_ENV

      - name: Run FTT
        env:
          FTT_VISUAL_MODE: ${{ inputs.visual_mode }}
          FTT_VISION_BACKEND: ${{ inputs.vision_backend }}
          FTT_FILE_WORKERS: ${{ inputs.file_workers }}
          FTT_VISION_WORKERS: ${{ inputs.vision_workers }}
          FTT_DEPLOT_WORKERS: ${{ inputs.deplot_workers }}
          FTT_RENDER_MAX_PAGES: ${{ inputs.render_max_pages }}
          FTT_KEEP_VISUALS: ${{ inputs.keep_visuals }}
          FTT_VISION_MODEL_URL: ${{ inputs.model_url }}
          FTT_VISION_MMPROJ_URL: ${{ inputs.mmproj_url }}
          FTT_VISION_CHAT_TEMPLATE: ${{ inputs.chat_template }}
        run: |
          python -m ftt.run --config ftt.yml

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftt-output
          path: output
          if-no-files-found: warn

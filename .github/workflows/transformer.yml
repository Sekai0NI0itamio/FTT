name: FTT Transformer Based Project Extraction

on:
  workflow_dispatch:
    inputs:
      project_path:
        description: "Path to Transformer export (dir or zip)"
        required: false
        default: "incoming-transformer"
      vision_backend:
        description: "Vision backend: local_llama_cpp|openai|anthropic|gemini"
        required: false
        default: "local_llama_cpp"
      chart_model:
        description: "Chart extraction model: unichart (best) | matcha (good) | deplot (lightweight)"
        required: false
        default: "unichart"
        # Model download URLs (auto-downloaded by HuggingFace transformers):
        #   unichart → https://huggingface.co/ahmed-masry/unichart-base-960
        #   matcha   → https://huggingface.co/google/matcha-chartqa
        #   deplot   → https://huggingface.co/google/deplot
      file_workers:
        description: "File worker concurrency"
        required: false
        default: "2"
      vision_workers:
        description: "Vision worker concurrency"
        required: false
        default: "2"
      force_setup:
        description: "Force reinstall deps/build/models (true|false)"
        required: false
        default: "false"

# ─────────────────────────────────────────────────────────────────────────
# Single-job architecture for speed:
#
#   1. Parallel init — apt-get, venv, llama.cpp build run concurrently
#   2. All extractions run in one process via ThreadPoolExecutor
#   3. Models loaded once, shared across all extraction types
#
# This avoids the overhead of separate jobs each re-installing deps
# and re-downloading models (~30s+ per job, ~1.5min for chart models).
# ─────────────────────────────────────────────────────────────────────────

jobs:
  extract:
    name: "FTT Transformer Extraction"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Restore all caches upfront ──────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('requirements.txt') }}

      - name: Cache llama.cpp
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp
          key: ${{ runner.os }}-llama-cmake-v1

      - name: Cache HuggingFace chart models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ inputs.chart_model }}

      - name: Cache vision models
        uses: actions/cache@v4
        with:
          path: ~/.cache/ftt/models
          key: ${{ runner.os }}-ftt-models

      # ── Parallel initialization ─────────────────────────────────────────
      - name: Parallel initialization
        env:
          CACHE_VENV_HIT: ${{ steps.cache-venv.outputs.cache-hit }}
          FORCE_SETUP: ${{ inputs.force_setup }}
        run: |
          PIDS=()

          # 1. System dependencies (background)
          (sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils libreoffice tesseract-ocr) &
          PIDS+=($!)

          # 2. Python venv + packages (background, skip if cache hit)
          if [ "$CACHE_VENV_HIT" != "true" ] || [ "$FORCE_SETUP" == "true" ]; then
            (python -m venv .venv && .venv/bin/python -m pip install --upgrade pip -q && .venv/bin/pip install -r requirements.txt -q) &
            PIDS+=($!)
          fi

          # 3. llama.cpp build (background, skip if binary exists)
          NEED_LLAMA=true
          for bin in llama-mtmd-cli llama-llava-cli llava-cli; do
            [ -f "vendor/llama.cpp/build/bin/$bin" ] && NEED_LLAMA=false && break
          done
          if [ "$NEED_LLAMA" == "true" ]; then
            (
              if [ ! -d vendor/llama.cpp/.git ]; then
                rm -rf vendor/llama.cpp
                git clone --depth 1 https://github.com/ggerganov/llama.cpp vendor/llama.cpp
              fi
              cmake -S vendor/llama.cpp -B vendor/llama.cpp/build -DGGML_NATIVE=OFF 2>&1 | tail -3
              cmake --build vendor/llama.cpp/build -j$(nproc) 2>&1 | tail -3
            ) &
            PIDS+=($!)
          fi

          # Wait for all background tasks
          FAIL=0
          for pid in "${PIDS[@]}"; do
            wait "$pid" || FAIL=1
          done
          [ "$FAIL" -eq 0 ] || exit 1

          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      # ── Configure paths ─────────────────────────────────────────────────
      - name: Configure llama.cpp path
        run: |
          LLAMA_CLI=$(find vendor/llama.cpp/build -type f \( -name 'llama-mtmd-cli' -o -name 'llama-llava-cli' -o -name 'llava-cli' \) 2>/dev/null | head -n 1)
          if [ -n "$LLAMA_CLI" ]; then
            echo "FTT_VISION_LLAMA_CLI_PATH=$LLAMA_CLI" >> $GITHUB_ENV
            echo "Found llama CLI: $LLAMA_CLI"
          fi

      # ── Run all extractions ─────────────────────────────────────────────
      - name: Run all extractions
        env:
          FTT_DEPLOT_MODEL: ${{ inputs.chart_model }}
          FTT_VISION_BACKEND: ${{ inputs.vision_backend }}
          FTT_FILE_WORKERS: ${{ inputs.file_workers }}
          FTT_VISION_WORKERS: ${{ inputs.vision_workers }}
        run: |
          PROJECT_PATH="${{ inputs.project_path }}"
          if [ -d "$PROJECT_PATH" ]; then
            ZIP=$(ls "$PROJECT_PATH"/*.zip 2>/dev/null | head -n 1)
            [ -n "$ZIP" ] && PROJECT="$ZIP" || PROJECT="$PROJECT_PATH"
          else
            PROJECT="$PROJECT_PATH"
          fi
          .venv/bin/python -m ftt.transformer_run \
            --project "$PROJECT" --output ftt-transformer-output --mode all

      # ── Upload results ──────────────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftt-transformer-output
          path: ftt-transformer-output
          if-no-files-found: warn

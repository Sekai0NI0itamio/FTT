inputs:
  dir: incoming
outputs:
  dir: output
vision:
  backend: local_llama_cpp
  model_path: ~/.cache/ftt/models/qwen2-vl-2b-instruct-q4_k_m.gguf
  mmproj_path: ~/.cache/ftt/models/mmproj-qwen2-vl-2b-instruct-q8_0.gguf
  lora_path: ""
  llama_cli_path: vendor/llama.cpp/build/bin/llama-mtmd-cli
  chat_template: ""
  text_prompt: "Extract all visible text exactly as it appears. Return only the text."
  description_prompt: "Describe the image in detail. Mention objects, layout, and any visible text context."
  max_tokens: 512
  retries: 2
  download: true
  model_url: "https://huggingface.co/ggml-org/Qwen2-VL-2B-Instruct-GGUF/resolve/main/Qwen2-VL-2B-Instruct-Q4_K_M.gguf"
  mmproj_url: "https://huggingface.co/ggml-org/Qwen2-VL-2B-Instruct-GGUF/resolve/main/mmproj-Qwen2-VL-2B-Instruct-Q8_0.gguf"
  prompt_template: |
    You are a document transcription assistant.
    Tasks:
    1) Transcribe all visible text exactly.
    2) Describe the image in detail.
    3) If this is a chart/graph, extract a Markdown table of data values including axis labels, units, and series names.
    Output with sections:
    Text:
    Description:
    Chart Data (if any):
visual:
  mode: hybrid
  max_dim: 1024
  text_threshold: 200
render:
  dpi: 150
  max_pages: 30
  office: auto
concurrency:
  file_workers: 2
  vision_workers: 1
  deplot_workers: 1
limits:
  max_file_mb: 100
  max_pages_per_file: 200
  max_images_per_file: 100
logging:
  level: info
  keep_visuals: true
deplot:
  enabled: true
  model_name: google/deplot
  max_tokens: 512
  prompt: "Generate the underlying data table of the chart. If the image is not a chart, output NO_CHART."
  cache_dir: ~/.cache/huggingface
